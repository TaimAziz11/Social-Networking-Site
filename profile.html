<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media</title>
    <!-- IMPORT BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
    <!--// IMPORT BOOTSTRAP //-->

    <!-- IMPORT AXIOS -->
     <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!--// IMPORT AXIOS //-->

    <!-- MAIN LOGIC SCRIPT -->
    <script src="mainLogic.js"></script> 
    <!--// MAIN LOGIC SCRIPT //-->

    <link rel="stylesheet" href="style.css">
    <script src="profileLogic.js"></script>
    <!-- <script src="homeLogic.js"></script> -->
</head>
<body>
    
    <!-- NAVIGATION BAR CONTAINER -->
    <div class="container">
        <div class="d-flex justify-content-center">
            <div class="col-9" style="position: fixed; z-index: 100;">
                <nav class="navbar navbar-expand-lg text-light rounded shadow border-bottom pt-3 p-2" style="background-color: #7f4fdf;">
                    <div class="container-fluid">
                        <a class="navbar-brand text-light fs-3" href="#"><strong>Social Media</strong></a>
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                        <div class="collapse navbar-collapse" id="navbarNav">
                            <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link active text-light fs-5" aria-current="page" href="index.html">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-light fs-5" onclick="profileClicked()" style="cursor: pointer;">Profile</a>
                            </li>
                            </ul>
                            <!-- NON LOGGED IS USER -->
                            <div class="d-flex w-100 justify-content-end" id="logged-in-div">
                                <button id="login" type="button" data-bs-toggle="modal" data-bs-target="#login-modal" class="btn btn-success mx-2">Login</button>
                                <button id="register" type="button" data-bs-toggle="modal" data-bs-target="#register-modal" class="btn btn-success">Register</button>
                            </div>
                            <!--// NON LOGGED IS USER //-->

                            <!-- FOR LOGGED IN USER -->
                            <div class="d-flex w-100 justify-content-end align-items-center" id="logout-div">
                                <img id="nav-user-image" class="rounded-circle" style="width: 40px; height: 40px;" src="./profile-pics/FB_IMG_1521118840852.jpg" alt="">
                                <b id="nav-username" class="mx-2">
                                    @Taim
                                </b>
                                <button onclick="logOut()" id="logout" type="button" data-bs-toggle="modal"  class="btn btn-danger mx-2">Log Out</button>

                            </div> 
                            <!--// FOR LOGGED IN USER //-->
                        </div>
                    </div>
                </nav>
            </div>
        </div>
    </div>
    <!--// NAVIGATION BAR CONTAINER //-->

    <!-- MAIN CONTENT -->
    <div class="container" style="height: 1000px;">
        <!-- PROFILE INFORMATION -->
            
        <div class="d-flex justify-content-center" style="margin-top: 80px;">
            <div class="col-9">
                <!-- MAIN INFO -->
                <div class="card shadow">
                    
                    <div class="card-body">
                        <div class="row">
                            <!-- USER IMAGE -->
                            <div class="col-3 d-flex flex-column justify-content-center align-items-center">
                                <img id="header-image" src=""  alt="">
                            </div> 
                            <!--// USER IMAGE //-->

                            <!-- USERNAME + EMAIL + NAME -->
                            <div id="main-info" class="col-4 d-flex flex-column justify-content-evenly">
                                <div class="user-main-info" >
                                    <strong>Email: </strong><span id="user-email"></span>
                                </div>
                                <div class="user-main-info" >
                                    <strong>Name: </strong><span id="user-name"></span>
                                </div>
                                <div class="user-main-info" >
                                    <strong>Username: </strong><span id="user-username"></span>
                                </div>
                            </div> 
                            <!--// USERNAME + EMAIL + NAME //-->

                            <!-- POSTS AND COMMENTS COUNT -->
                            <div class="col-4 d-flex flex-column justify-content-evenly">
                                <div class="number-info">
                                    <span id="posts-count">13</span> Posts
                                </div>
                                <div class="number-info">
                                    <span id="comments-count">10</span> Comments
                                </div>
                            </div> 
                            <!--// POSTS AND COMMENTS COUNT //-->
                        </div>
                    </div>
                </div>
                <!-- MAIN INFO -->

                <!-- POSTS TITLE -->
                <div class="row d-flex justify-content-center mt-3">
                    <div class="col-9" style="text-align: center;">
                        <h1>
                            <span id="profil-posts-user">
                                Taim's
                            </span>
                            Posts
                        </h1>
                    </div>
                </div>
                <!--// POSTS TITLE //-->

                <!-- POSTS -->
                <div class="mb-2" id="user-posts">
                    <!-- POST -->
                    
                    <!--// POST //-->
                </div>
                <!--// POSTS //-->
            </div>
        </div>        
            
        <!--// PROFILE INFORMATION //-->
    </div>
    <!--// MAIN CONTENT //-->

    <!-- MODALS -->
    <!-- LOGIN-MODAL -->
    <div class="modal fade" id="login-modal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Login</h1>
                    <button id="login-btn" type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="recipient-name" class="col-form-label">Username:</label>
                            <input id="username-input" type="text" class="form-control" id="recipient-name">
                        </div>
                        <div class="mb-3">
                            <label for="message-text" class="col-form-label">Password:</label>
                            <input id="password-input" type="password" class="form-control" id="recipient-name">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="loginBtnClicked()">Login</button>
                </div>
            </div>
        </div>
    </div> 
    <!--// LOGIN-MODAL //-->

    <!-- REGISTER-MODAL -->
    <div class="modal fade" id="register-modal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Register A New User</h1>
                    <button id="login-btn" type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="recipient-name" class="col-form-label">Name:</label>
                            <input id="register-name-input" type="text" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="recipient-name" class="col-form-label">Username:</label>
                            <input id="register-username-input" type="text" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="recipient-name" class="col-form-label">Email:</label>
                            <input id="register-email-input" type="email" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="message-text" class="col-form-label">Password:</label>
                            <input id="register-password-input" type="password" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="recipient-name" class="col-form-label">Profile Image</label>
                            <input id="register-image-input" type="file" class="form-control">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="RegisterBtnClicked()">Register</button>
                </div>
            </div>
        </div>
    </div> 
    <!--// REGISTER-MODAL //-->

    <!-- CREATE-POST-MODAL -->
    <div class="modal fade" id="create-post-modal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="post-title-modal">Create A New Post</h1>
                    <button id="create-post-btn" type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="recipient-name" class="col-form-label">Title</label>
                            <input id="create-post-title-input" type="text" class="form-control">
                            <input type="hidden" name="" id="post-id-input" value="">
                        </div>
                        <div class="mb-3">
                            <textarea name="" id="create-post-body-input" style="width: 100%; height: 100px; border-color: rgb(173, 173, 173); border-radius: 10px; resize: none;">

                            </textarea>
                        </div>
                        <div class="mb-3">
                            <label for="recipient-name" class="col-form-label">Image</label>
                            <input id="create-post-image-input" type="file" class="form-control">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button id="post-modal-submit-btn" type="button" class="btn btn-primary" onclick="createNewPostClicked()">Create</button>
                </div>
            </div>
        </div>
    </div> 
    <!--// CREATE-POST-MODAL //-->

    <!-- DELETE-POST-MODAL -->
    <div class="modal fade" id="delete-post-modal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content" style="background-color: rgb(255, 214, 214);">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="post-title-modal">Are you sure, you want to delete this post?
                        <span id="delete-post-title"></span>
                    </h1>
                    <button id="create-post-btn" type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    <input type="hidden" id="delete-post-id-input" value=""> <!-- to get a current id -->
                </div>
                <!-- <div class="modal-body">
                    
                </div> -->
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button id="post-modal-submit-btn" type="button" class="btn btn-danger" onclick="confirmPostDelete()">Delete</button>
                </div>
            </div>
        </div>
    </div> 
    <!--// DELETE-POST-MODAL //-->

    <!--// MODALS //-->

    <!-- ADD POST BOTTON -->
    <div class="bg-primary" id="addBtn" onclick="addBtnClicked()">
        <span class="plus-icon">+</span>
    </div> 
    <!--// ADD POST BOTTON //-->

    <!-- ALERT -->
    <div id="liveAlertPlaceholder" class="show fade" style="position: fixed; z-index: 99999; width: 30%; bottom: 0; right: 0;"></div>
    <!--// ALERT //-->

    <!-- LOADER -->
    <div id="loader">
        <div class="lds-roller">
            <div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div>
        </div>
    </div> 
    <!--// LOADER //-->

</body>
